<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePlace – Dashboard</title><link rel="stylesheet" href="Styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body> 
  <div class="app">
  <!-- BARRA LATERAL --> 
    <aside class="sidebar">
      <!-- Titulo y Logo -->
      <div class="sidebar__brand">
        <div class="sidebar__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div><div class="sidebar__name">SafePlace</div><div class="sidebar__sub">BIOMETRIC MONITOR</div></div>
      </div>

    <!-- Navegación -->
      <nav class="sidebar__nav">
        <a class="nav-item nav-item--active" href="Admin-Home.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Home </a>
        <a class="nav-item" href="Admin-Empleados.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Empleados</a>
        <a class="nav-item" href="Admin-RolesPermisos.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Roles y Permisos</a>
        <a class="nav-item" href="Admin-Configuración.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Configuración</a>
      </nav>

      <!-- Usuario logueado + cerrar sesión -->
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar avatar--sm">CM</div>
            <div>
              <div class="sidebar__user-name">Carlos Mendoza</div>   <!--PONER EL NOMBRE DEL QUE ENTRO-->
              <div class="sidebar__user-role">Administrador</div>     <!--PONER EL ROL DEL QUE ENTRO-->
            </div>
        </div>
       <a class="sidebar__logout" href='InicioSesion.html'><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión </a>
      </div>

    </aside>

    <!-- BARRA SUPERIOR --> 
    <main class="main">
        <header class="topbar">
            <div class="topbar__title"> Gestión de Empleados </div>
            <div class="topbar__right">
            <div class="status-dot"> <span class="dot dot--green"></span> En línea </div>
            <div class="avatar"> CM </div> <!--PONER EL avatar-->
            </div>
        </header>

        <!-- Encabezado de sección -->
        <div class="emp-header">
            <div>
                <h2 class="emp-header__title">Gestión de Empleados</h2>
                <p class="emp-header__count" id="empCount">8 empleados registrados</p> <!-- Cantidad de empleados que tengo -->
            </div>
            <button class="btn-nuevo" id="btnNuevo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"> <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/> </svg> Nuevo Empleado </button>
        </div>

        <!-- Barra de búsqueda + filtro -->
        <div class="emp-toolbar">
            <div class="emp-search">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="emp-search__icon"> <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="emp-search__input" id="searchInput" type="text" placeholder="Buscar por nombre o número..." />
            </div>
            <select class="emp-filter" id="filterStatus">
                <option value="todos">Todos</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
            </select>
        </div>

        <!-- Tabla -->
        <div class="emp-table-wrap">
            <table class="emp-table">
                <thead>
                    <tr>
                        <th>N° EMPLEADO</th>
                        <th>NOMBRE</th>
                        <th>DEPARTAMENTO</th>
                        <th>ROL</th>
                        <th>ESTADO</th>
                        <th>ALTA</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="empTableBody"></tbody>
            </table>
        </div>

        <!-- Nuevo / Editar un empleado -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal__header">
                    <h3 class="modal__title" id="modalTitle">Nuevo Empleado</h3>
                    <button class="modal__close" id="modalClose"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"> <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/> </svg> </button>
                </div>
                <div class="modal__body">
                    <div class="modal__field">
                        <label class="modal__label">NOMBRE COMPLETO</label>
                        <input class="modal__input" id="mNombre" type="text" placeholder="Ej: Juan Pérez" />
                    </div>
                    <div class="modal__field">
                        <label class="modal__label">DEPARTAMENTO</label>
                        <select class="modal__input" id="mDept">
                            <option value="">Seleccionar...</option>
                            <option>Producción</option>
                            <option>Logística</option>
                            <option>Mantenimiento</option>
                            <option>Almacén</option>
                        </select>
                    </div>
                    <div class="modal__field">
                        <label class="modal__label">ROL</label>
                        <select class="modal__input" id="mRol">
                        <option value="">Seleccionar...</option>
                        <option>Trabajador</option>
                        <option>Supervisor</option>
                        <option>Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="modal__footer">
                    <button class="modal__btn modal__btn--cancel" id="modalCancel">Cancelar</button>
                    <button class="modal__btn modal__btn--save" id="modalSave">Guardar</button>
                </div>
            </div>
        </div>
    </main>
  <script src="Admin-Empleados.js"></script>
</body>
</html>
