<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePlace – Dashboard</title><link rel="stylesheet" href="Styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body> 
  <div class="app">
  <!-- BARRA LATERAL --> 
    <aside class="sidebar">
      <!-- Titulo y Logo -->
      <div class="sidebar__brand">
        <div class="sidebar__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div><div class="sidebar__name">SafePlace</div><div class="sidebar__sub">BIOMETRIC MONITOR</div></div>
      </div>

    <!-- Navegación -->
      <nav class="sidebar__nav">
        <a class="nav-item" href="Admin-Home.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Home </a>
        <a class="nav-item" href="Admin-Empleados.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Empleados</a>
        <a class="nav-item nav-item--active" href="Admin-RolesPermisos.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Roles y Permisos</a>
        <a class="nav-item" href="Admin-Configuración.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Configuración</a>
      </nav>

      <!-- Usuario logueado + cerrar sesión -->
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar avatar--sm">CM</div>
            <div>
              <div class="sidebar__user-name">Carlos Mendoza</div>   <!--PONER EL NOMBRE DEL QUE ENTRO-->
              <div class="sidebar__user-role">Administrador</div>     <!--PONER EL ROL DEL QUE ENTRO-->
            </div>
        </div>
        <a class="sidebar__logout" href='InicioSesion.html'><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión </a>
      </div>

    </aside>

    <!-- BARRA SUPERIOR --> 
    <main class="main">
      <header class="topbar">
        <div class="topbar__title"> Home </div>
        <div class="topbar__right">
          <div class="status-dot"> <span class="dot dot--green"></span> En línea </div>
          <div class="avatar"> CM </div> <!--PONER EL avatar-->
        </div>
      </header>

      <!-- Bienvenida -->
      <div class="welcome">
        <h2 class="welcome__title">Bienvenido, Carlos</h2> <!-- Nombre del que inicio sesion -->
        <p class="welcome__date" id="currentDate"></p> 
      </div>

    <!-- PANTALLA ROLES Y PERMISOS -->

    <!-- Tabs de roles -->
    <div class="roles-tabs" id="rolesTabs">
        <button class="roles-tab roles-tab--active" data-rol="administrador">Administrador</button>
        <button class="roles-tab" data-rol="supervisor">Supervisor Operativo</button>
        <button class="roles-tab" data-rol="seguridad">Responsable de Seguridad e Higiene</button>
    </div>

    <!-- Grid de módulos -->
    <div class="roles-grid" id="rolesGrid"></div>

  <script src="Admin-RolesPermisos.js"></script>
</body>
</html>
