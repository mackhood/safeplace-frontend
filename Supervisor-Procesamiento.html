<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePlace – Monitoreo</title>
  <link rel="stylesheet" href="Styles.css" />
</head>

<body>
    <div class="app">
        <!-- BARRA LATERAL -->
        <aside class="sidebar">
            <!-- Titulo y Logo -->
            <div class="sidebar__brand">
                <div class="sidebar__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                <div><div class="sidebar__name">SafePlace</div><div class="sidebar__sub">BIOMETRIC MONITOR</div></div>
            </div>
            
            <!-- Navegación -->
            <nav class="sidebar__nav">
            <a class="nav-item" href="Supervisor-Home.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>  <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Home </a>
            <a class="nav-item nav-item--active" href="Supervisor-Monitoreo.html"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/> </svg> Monitoreo </a>
            <a class="nav-item" href="Supervisor-Mediciones.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>  Mediciones </a>
            <a class="nav-item" href="Supervisor-Wearables.html"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/> </svg> Wearables </a>
            <a class="nav-item" href="Supervisor-Procesamiento.html"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <rect x="2" y="3" width="20" height="14" rx="2"/> <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/> </svg>  Procesamiento </a>
            <a class="nav-item" href="Supervisor-Notificaciones.html"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/> <path d="M13.73 21a2 2 0 0 1-3.46 0"/> </svg> Notificaciones </a>
            </nav>

            <!-- Usuario logueado + cerrar sesión -->
            <div class="sidebar__footer">
                <div class="sidebar__user">
                    <div class="avatar avatar--sm">MG</div>
                    <div>
                        <div class="sidebar__user-name">María González</div> <!--PONER EL NOMBRE DEL QUE ENTRO-->
                        <div class="sidebar__user-role">Supervisor Operativo</div> <!--PONER EL ROL DEL QUE ENTRO-->
                    </div>
                </div>
            <button class="sidebar__logout" href='InicioSesion.html'><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión </button>
            </div>
        </aside>

        <!-- BARRA SUPERIOR --> 
        <main class="main">
            <header class="topbar">
                <div class="topbar__title">Monitoreo en Tiempo Real</div>
                <div class="topbar__right">
                    <div class="notif-bell"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/> <path d="M13.73 21a2 2 0 0 1-3.46 0"/> </svg> <span class="notif-badge" id="notifBadge">4</span> </div>
                    <div class="avatar">MG</div> <!--PONER EL avatar-->
                </div>
            </header>

            <!-- Encabezado de sección -->
            <div class="mon-header">
                <div>
                    <h2 class="welcome__title">Monitoreo de Trabajadores</h2> <p class="mon-header__status">
                    <span class="dot dot--green"></span> Datos en tiempo real · Última actualización: <span id="lastUpdate">--:--:--</span>
                    </p>
                </div>
                <button class="btn-actualizar" id="btnActualizar"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"> <polyline points="23 4 23 10 17 10"/> <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/> </svg> Actualizar</button>
            </div>

             <!-- PANTALLA -->

        </main>
    </div>
</body>
</html>
